<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #030b18;
  --bg2:     #071224;
  --bg3:     #0a1a35;
  --surface: #0f2347;
  --border:  #162d52;
  --text:    #e8f0fe;
  --muted:   #4a6080;
  --font-h:  'Syne', sans-serif;
  --font-b:  'DM Sans', sans-serif;
  --font-m:  'DM Mono', monospace;
  --accent:  #f5a623;
  --c:       #7c3aed; /* overridden by JS */
}
html { background: var(--bg); color: var(--text); font-family: var(--font-b); }
body { min-height: 100vh; }

/* ── PARTICLES BG ── */
#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%;
  animation: float linear infinite;
  opacity: .12;
}
@keyframes float {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: .12; }
  90%  { opacity: .08; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ── PAGE ── */
.page { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 0 0 60px; }

/* ── HEADER BAND ── */
.header-band {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d1f40 0%, transparent 100%);
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
}
.logo-m {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #f5a623, #d4881e);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-h); font-weight: 900; font-size: 16px; color: #fff;
  box-shadow: 0 4px 16px #f5a62330;
}
.header-text p:first-child { font-family: var(--font-m); font-size: 9px; color: var(--muted); letter-spacing: 2.5px; }
.header-text p:last-child  { font-family: var(--font-h); font-size: 15px; font-weight: 700; color: var(--text); }
.id-chip {
  margin-left: auto; font-family: var(--font-m); font-size: 11px;
  padding: 4px 12px; border-radius: 20px; font-weight: 500;
  border: 1px solid; /* color set by JS */
  flex-shrink: 0;
}

/* ── HERO CARD ── */
.hero-card {
  margin: 20px 20px 0;
  border-radius: 22px; overflow: hidden;
  border: 1px solid var(--border);
  background: linear-gradient(145deg, var(--bg2), var(--bg3));
  box-shadow: 0 0 60px rgba(0,0,0,.5);
  animation: slideUp .5s ease both;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.hero-top {
  padding: 24px 24px 20px;
  position: relative; overflow: hidden;
}
.hero-glow {
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  filter: blur(60px); opacity: .25;
  pointer-events: none;
}
.avatar-row { display: flex; gap: 16px; align-items: flex-start; position: relative; z-index: 1; }
.avatar {
  width: 64px; height: 64px; border-radius: 18px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-h); font-size: 22px; font-weight: 800; color: #fff;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.delegate-name {
  font-family: var(--font-h); font-size: 26px; font-weight: 800;
  color: var(--text); line-height: 1.1; margin-bottom: 4px;
}
.delegate-sub { font-size: 13px; color: var(--muted); font-family: var(--font-m); }
.committee-tag {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 6px 14px; border-radius: 20px;
  font-family: var(--font-h); font-size: 12px; font-weight: 700; color: #fff;
}
.committee-tag::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.6); }

.hero-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  border-top: 1px solid var(--border);
}
.hero-cell {
  background: var(--bg2); padding: 14px 18px;
}
.hero-cell:first-child { border-radius: 0; }
.cell-label { font-family: var(--font-m); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.cell-val { font-size: 14px; font-weight: 700; color: var(--text); font-family: var(--font-h); }
.cell-val.mono { font-family: var(--font-m); font-size: 13px; }

/* ── QR SECTION ── */
.qr-section {
  margin: 14px 20px 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 18px;
  padding: 20px; text-align: center;
  animation: slideUp .5s .1s ease both;
}
.qr-label { font-family: var(--font-m); font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 14px; }
.qr-wrap { display: inline-block; padding: 12px; background: #fff; border-radius: 14px; }
.qr-wrap img { display: block; border-radius: 6px; }
.qr-note { font-family: var(--font-m); font-size: 9px; color: var(--muted); margin-top: 10px; }

/* ── MAP SECTION ── */
.map-section {
  margin: 14px 20px 0;
  animation: slideUp .5s .2s ease both;
}
.section-label {
  font-family: var(--font-m); font-size: 9px; color: var(--muted);
  letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

.venue-map {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 18px;
  padding: 14px; overflow: hidden;
}
.map-grid {
  position: relative; width: 100%; padding-bottom: 58%;
  background: #04101f; border-radius: 12px; overflow: hidden;
  border: 1px solid #0a1a35;
}
.room {
  position: absolute; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: all .4s cubic-bezier(.34,1.56,.64,1);
  cursor: default;
}
.room span {
  font-family: var(--font-m); font-size: 8px; font-weight: 500;
  text-align: center; line-height: 1.3; white-space: pre-line;
  padding: 2px 4px;
}
.room.highlight { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(var(--hl-rgb),.4); }
  50%      { box-shadow: 0 0 0 8px rgba(var(--hl-rgb),.0); }
}
.map-legend {
  margin-top: 10px; text-align: center;
  font-family: var(--font-m); font-size: 10px; color: var(--muted);
}
.map-legend strong { font-weight: 700; }

/* ── CONFERENCE INFO ── */
.info-section {
  margin: 14px 20px 0;
  animation: slideUp .5s .3s ease both;
}
.info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; text-align: center;
}
.info-icon { font-size: 22px; margin-bottom: 6px; }
.info-card-label { font-family: var(--font-m); font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.info-card-val { font-family: var(--font-h); font-size: 13px; font-weight: 700; color: var(--text); }

/* ── FOOTER ── */
.footer {
  margin: 24px 20px 0; text-align: center;
  font-family: var(--font-m); font-size: 9px; color: #1a3050;
  letter-spacing: 1.5px;
}

/* ── ERROR STATE ── */
.error-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; padding: 40px;
  position: relative; z-index: 1;
}
.error-page h1 { font-family: var(--font-h); font-size: 24px; color: #f87171; }
.error-page p  { font-size: 13px; color: var(--muted); text-align: center; max-width: 300px; }
</style>

        ID-${String(d.id).padStart(3,"0")}
      </div>
    </header>

    <div class="hero-card">
      <div class="hero-top">
        <div class="hero-glow" style="background:${color.hex}"></div>
        <div class="avatar-row">
          <div class="avatar" style="background:linear-gradient(135deg,${color.hex},${color.hex}88)">${initials(d.name)}</div>
          <div>
            <div class="delegate-name">${d.name}</div>
            <div class="delegate-sub">CLASS ${d.cls.toUpperCase()} &nbsp;·&nbsp; ${d.section}</div>
            <div class="committee-tag" style="background:${color.hex}33;color:${color.hex};border:1px solid ${color.hex}44">
              ${d.committee}
            </div>
          </div>
        </div>
      </div>
      <div class="hero-grid">
        <div class="hero-cell">
          <div class="cell-label">${portLabel}</div>
          <div class="cell-val">${portVal}</div>
        </div>
        <div class="hero-cell">
          <div class="cell-label">SECTION</div>
          <div class="cell-val">${d.section}</div>
        </div>
        <div class="hero-cell">
          <div class="cell-label">CLASS</div>
          <div class="cell-val">${d.cls}</div>
        </div>
        <div class="hero-cell">
          <div class="cell-label">CONTACT</div>
          <div class="cell-val mono">${d.contact}</div>
        </div>
      </div>
    </div>

    <div class="qr-section">
      <div class="qr-label">Your Delegate QR Code</div>
      <div class="qr-wrap">
        <img src="${qrSrc}" width="160" height="160" alt="Your QR Code" loading="lazy"/>
      </div>
      <div class="qr-note">Scan to re-open this page · SPSMUN-3 · SR #${d.id}</div>
    </div>

    <div class="map-section">
      <div class="section-label">Conference Venue Map</div>
      <div class="venue-map">
        <div class="map-grid">${mapRooms}</div>
        <div class="map-legend">
          Your committee <strong style="color:${color.hex}">${d.committee}</strong> is highlighted above
        </div>
      </div>
    </div>

    <div class="info-section">
      <div class="section-label">Conference Info</div>
      <div class="info-cards">
        <div class="info-card">
          <div class="info-icon">📍</div>
          <div class="info-card-label">Venue</div>
          <div class="info-card-val">SPS School<br>Panchkula</div>
        </div>
        <div class="info-card">
          <div class="info-icon">📅</div>
          <div class="info-card-label">Edition</div>
          <div class="info-card-val">SPSMUN 3.0<br>2025</div>
        </div>
        <div class="info-card">
          <div class="info-icon">🏛</div>
          <div class="info-card-label">Committee</div>
          <div class="info-card-val" style="color:${color.hex}">${d.committee}</div>
        </div>
        <div class="info-card">
          <div class="info-icon">🌐</div>
          <div class="info-card-label">Delegate ID</div>
          <div class="info-card-val" style="font-family:var(--font-m)">SR-${String(d.id).padStart(3,"0")}</div>
        </div>
      </div>
    </div>

    <div class="footer">
      SPSMUN 3.0 · DELEGATE CREDENTIALS · CONFIDENTIAL · DO NOT SHARE
    </div>
  `;

  page.style.display = "block";
}

// ── BOOT ──────────────────────────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(window.location.search);
  const rawId  = params.get("id");
  const token  = params.get("t");

  if (!rawId || !token) {
    document.getElementById("errorPage").style.display = "flex"; return;
  }

  const id = parseInt(rawId, 10);
  if (isNaN(id) || token !== expectedToken(id)) {
    document.getElementById("errorPage").style.display = "flex"; return;
  }

  const delegate = DELEGATES.find(d => d.id === id);
  if (!delegate) {
    document.getElementById("errorPage").style.display = "flex"; return;
  }

  render(delegate);
})();
</script>
</body>
</html>
